services:
  postgres:
    image: postgres:16
    container_name: pastebin-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pastebin
    ports:
      - "5433:5432"
    volumes:
      - pastebin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pastebin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: pastebin-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pastebin
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: pastebin-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  pastebin-pgdata:
